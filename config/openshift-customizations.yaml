# This file is used as an overlay to customize the generated config, so it contains the Presubmit pseudorelease.
prow:
  url: https://prow.ci.openshift.org/prowjobs.js
releases:
  "3.11":
    jobs:
      periodic-ci-openshift-openshift-ansible-release-3.11-e2e-aws-nightly: true
      periodic-ci-openshift-openshift-ansible-release-3.11-e2e-gcp-nightly: true
      periodic-ci-openshift-origin-release-3.11-e2e-gcp: true
  "Presubmits":
    regexp:
      - "^pull-ci-openshift-.*-(master|main).*-e2e-.*"
      - "^pull-ci-operator-framework.*-(master|main).*-e2e-.*"
      - "^pull-ci-openshift-online.*-(master|main).*-(verify|unit).*"
      - "^pull-ci-Azure-ARO-HCP-main.*"
  aro-integration:
    synthetic: true
    jobs:
      periodic-ci-Azure-ARO-HCP-main-periodic-integration-e2e-parallel: true
      periodic-ci-Azure-ARO-HCP-main-periodic-integration-e2e-parallel-ocp-nightly: true
      branch-ci-Azure-ARO-HCP-main-e2e-integration-e2e-parallel: true
  aro-stage:
    synthetic: true
    jobs:
      periodic-ci-Azure-ARO-HCP-main-periodic-stage-e2e-parallel: true
      periodic-ci-Azure-ARO-HCP-main-periodic-stage-e2e-parallel-ocp-nightly: true
      branch-ci-Azure-ARO-HCP-main-e2e-stage-e2e-parallel: true
  aro-production:
    synthetic: true
    jobs:
      periodic-ci-Azure-ARO-HCP-main-periodic-prod-e2e-parallel: true
      periodic-ci-Azure-ARO-HCP-main-periodic-create-aro-hcp-in-prod-uksouth: true
      periodic-ci-Azure-ARO-HCP-main-periodic-prod-brazilsouth-e2e-parallel: true
      periodic-ci-Azure-ARO-HCP-main-periodic-prod-centralindia-e2e-parallel: true
      periodic-ci-Azure-ARO-HCP-main-periodic-prod-uksouth-e2e-parallel: true
      periodic-ci-Azure-ARO-HCP-main-periodic-prod-e2e-parallel-ocp-nightly: true
      periodic-ci-Azure-ARO-HCP-main-capz-e2e-production: true
      branch-ci-Azure-ARO-HCP-main-e2e-prod-e2e-parallel: true
  capi-qe:
    synthetic: true
    jobs:
      periodic-ci-stolostron-capi-tests-configure-prow-mgmt-periodics-capz-e2e: true
  aro-classic-integration:
    synthetic: true
    jobs:
      periodic-ci-Azure-ARO-RP-master-periodic-integration-e2e-parallel-csp: true
      periodic-ci-Azure-ARO-RP-master-periodic-integration-e2e-parallel-miwi: true
      branch-ci-Azure-ARO-RP-master-e2e-integration-e2e-parallel: true
      branch-ci-Azure-ARO-RP-master-e2e-integration-e2e-parallel-csp: true
      branch-ci-Azure-ARO-RP-master-e2e-integration-e2e-parallel-miwi: true
  aro-classic-stage:
    synthetic: true
    jobs:
      periodic-ci-Azure-ARO-RP-master-periodic-stage-e2e-parallel-csp: true
      periodic-ci-Azure-ARO-RP-master-periodic-stage-e2e-parallel-miwi: true
      branch-ci-Azure-ARO-RP-master-e2e-stage-e2e-parallel: true
      branch-ci-Azure-ARO-RP-master-e2e-stage-e2e-parallel-csp: true
      branch-ci-Azure-ARO-RP-master-e2e-stage-e2e-parallel-miwi: true
  aro-classic-production:
    synthetic: true
    jobs:
      periodic-ci-Azure-ARO-RP-master-periodic-prod-e2e-parallel-csp: true
      periodic-ci-Azure-ARO-RP-master-periodic-prod-e2e-parallel-miwi: true
      branch-ci-Azure-ARO-RP-master-e2e-prod-e2e-parallel: true
      branch-ci-Azure-ARO-RP-master-e2e-prod-e2e-parallel-csp: true
      branch-ci-Azure-ARO-RP-master-e2e-prod-e2e-parallel-miwi: true
  rosa-stage:
    synthetic: true
    jobs:
      periodic-ci-openshift-release-main-osd-conformance-aws-k8s-conformance: true
    regexp:
      # rosa-e2e managed service validation nightlies (all run against staging OCM)
      - "^periodic-ci-openshift-online-rosa-e2e-main-periodics-.*"
      # rosa-e2e upgrade tests
      - "^periodic-ci-openshift-online-rosa-e2e-main-upgrade-.*"
      # OCM FVT staging
      - "^periodic-ci-openshift-online-rosa-e2e-main-ocm-fvt-.*-staging-.*"
      # ROSA Gap Analysis (all versions)
      - "^periodic-ci-openshift-online-rosa-gap-analysis-main-.*"
      # ROSA HCP conformance (all versions)
      - "^periodic-ci-openshift-release-main-nightly-.*-e2e-rosa-hcp-ovn$"
      # ROSA Classic/STS conformance (all versions)
      - "^periodic-ci-openshift-release-main-nightly-.*-e2e-rosa-sts-ovn$"
      # SRE operator e2e tests via Prow (staging)
      - "^periodic-ci-openshift-.*-master-rosa-sts-e2e-promotion-stage$"
      # ROSA CLI e2e tests
      - "^periodic-ci-openshift-rosa-master-e2e-rosa-.*"
      # Terraform provider RHCS e2e tests
      - "^periodic-ci-terraform-redhat-terraform-provider-rhcs-main-e2e-rosa-.*"
  rosa-integration:
    synthetic: true
    regexp:
      # OCM FVT integration
      - "^periodic-ci-openshift-online-rosa-e2e-main-ocm-fvt-.*-integration-.*"
      # SRE operator e2e tests via Prow (integration)
      - "^periodic-ci-openshift-.*-master-rosa-sts-e2e-promotion-int$"
  rosa-production:
    synthetic: true
    jobs:
      # ROSA CLI e2e tests targeting production (exact match takes priority over rosa-stage regex)
      periodic-ci-openshift-rosa-master-e2e-rosa-hcp-advanced-prod-critical-high-f3: true
      periodic-ci-openshift-rosa-master-e2e-rosa-sts-advanced-prod-critical-high-f3: true
      periodic-ci-openshift-rosa-master-e2e-rosa-sts-upgrade-y-stream-prod-f3: true
    regexp:
      # OCM FVT production
      - "^periodic-ci-openshift-online-rosa-e2e-main-ocm-fvt-.*-production-.*"
  rrp-integration:
    synthetic: true
    jobs:
      periodic-ci-openshift-online-rosa-hyperfleet-main-nightly-ephemeral: true
      periodic-ci-openshift-online-rosa-hyperfleet-main-nightly-integration: true
  automation:
    synthetic: true
    jobs:
      periodic-ci-openshift-hypershift-main-periodic-jira-agent: true
      periodic-ci-openshift-hypershift-main-periodic-review-agent: true
      periodic-ci-openshift-release-main-claude-payload-agent: true
      periodic-prow-auto-sippy-config-generator: true
  ocp-hypershift:
    synthetic: true
    regexp:
      - "^periodic-ci-openshift-hypershift-.*-periodics-hcm-.*"
