# This file is used as an overlay to customize the generated config, so it contains the Presubmit pseudorelease.
prow:
  url: https://prow.ci.openshift.org/prowjobs.js
componentReadiness:
  variantJunitTableOverrides:
    - variantName: JobTier
      variantValue: rare
      tableName: junit_rarely_run_jobs
      relativeStart: end-90d
releases:
  "3.11":
    jobs:
      periodic-ci-openshift-openshift-ansible-release-3.11-e2e-aws-nightly: true
      periodic-ci-openshift-openshift-ansible-release-3.11-e2e-gcp-nightly: true
      periodic-ci-openshift-origin-release-3.11-e2e-gcp: true
  "Presubmits":
    regexp:
      - "^pull-ci-openshift-.*-(master|main).*-e2e-.*"
      - "^pull-ci-operator-framework.*-(master|main).*-e2e-.*"
      - "^pull-ci-openshift-online.*-(master|main).*-(verify|unit).*"
      - "^pull-ci-Azure-ARO-HCP-main.*"
  aro-integration:
    jobs:
      periodic-ci-Azure-ARO-HCP-main-periodic-integration-e2e-parallel: true
      periodic-ci-Azure-ARO-HCP-main-periodic-integration-e2e-parallel-ocp-nightly: true
  aro-stage:
    jobs:
      periodic-ci-Azure-ARO-HCP-main-periodic-stage-e2e-parallel: true
      periodic-ci-Azure-ARO-HCP-main-periodic-stage-e2e-parallel-ocp-nightly: true
  aro-production:
    jobs:
      periodic-ci-Azure-ARO-HCP-main-periodic-prod-e2e-parallel: true
      periodic-ci-Azure-ARO-HCP-main-periodic-create-aro-hcp-in-prod-uksouth: true
      periodic-ci-Azure-ARO-HCP-main-periodic-prod-brazilsouth-e2e-parallel: true
      periodic-ci-Azure-ARO-HCP-main-periodic-prod-centralindia-e2e-parallel: true
      periodic-ci-Azure-ARO-HCP-main-periodic-prod-uksouth-e2e-parallel: true
      periodic-ci-Azure-ARO-HCP-main-periodic-prod-e2e-parallel-ocp-nightly: true
  rosa-stage:
    jobs:
      # ROSA Classic/STS nightly (stage)
      periodic-ci-openshift-osde2e-main-nightly-4.16-rosa-classic-sts: true
      periodic-ci-openshift-osde2e-main-nightly-4.17-rosa-classic-sts: true
      periodic-ci-openshift-osde2e-main-nightly-4.18-rosa-classic-sts: true
      periodic-ci-openshift-osde2e-main-nightly-4.19-rosa-classic-sts: true
      periodic-ci-openshift-osde2e-main-nightly-4.20-rosa-classic-sts: true
      periodic-ci-openshift-osde2e-main-nightly-4.21-rosa-classic-sts: true
      periodic-ci-openshift-osde2e-main-nightly-4.22-rosa-classic-sts: true
      # ROSA HCP nightly (stage)
      periodic-ci-openshift-osde2e-main-nightly-4.21-rosa-hcp: true
      # ROSA proxy tests (stage)
      periodic-ci-openshift-osde2e-main-rosa-stage-e2e-byo-vpc-proxy-install: true
      periodic-ci-openshift-osde2e-main-rosa-stage-e2e-byo-vpc-proxy-postinstall: true
      # OSD-AWS nightly (stage, relevant to ROSA)
      periodic-ci-openshift-osde2e-main-nightly-4.16-osd-aws: true
      periodic-ci-openshift-osde2e-main-nightly-4.17-osd-aws: true
      periodic-ci-openshift-osde2e-main-nightly-4.18-osd-aws: true
      periodic-ci-openshift-osde2e-main-nightly-4.19-osd-aws: true
      periodic-ci-openshift-osde2e-main-nightly-4.20-osd-aws: true
      periodic-ci-openshift-osde2e-main-nightly-4.21-osd-aws: true
      periodic-ci-openshift-osde2e-main-nightly-4.22-osd-aws: true
      # OSD-AWS upgrades (stage)
      periodic-ci-openshift-osde2e-main-osd-aws-upgrade-latest-default-z-minus-1-to-latest-default-z: true
      periodic-ci-openshift-osde2e-main-osd-aws-upgrade-latest-default-y-minus-1-to-latest-default-y: true
      periodic-ci-openshift-osde2e-main-osd-aws-upgrade-latest-default-y-to-latest-y-plus-1: true
      periodic-ci-openshift-osde2e-main-osd-aws-upgrade-latest-default-y-plus-1-to-latest-y: true
      # OSD-AWS informing (stage)
      periodic-ci-openshift-osde2e-main-aws-stage-informing-default: true
    regexp:
      # rosa-e2e managed service validation + OCM FVT (current and future versioned jobs)
      - "^periodic-ci-openshift-online-rosa-e2e-main-.*"
      # ROSA HCP conformance (all versions)
      - "^periodic-ci-openshift-release-main-nightly-.*-e2e-rosa-hcp-ovn$"
      # ROSA Classic/STS conformance (all versions)
      - "^periodic-ci-openshift-release-main-nightly-.*-e2e-rosa-sts-ovn$"
  rosa-integration:
    jobs: {}
  rosa-production:
    jobs: {}
  rrp-integration:
    jobs:
      periodic-ci-openshift-online-rosa-regional-platform-main-nightly-ephemeral: true
      periodic-ci-openshift-online-rosa-regional-platform-main-nightly-integration: true
  automation:
    jobs:
      periodic-ci-openshift-hypershift-main-periodic-jira-agent: true
      periodic-ci-openshift-hypershift-main-periodic-review-agent: true
      periodic-ci-openshift-release-main-claude-payload-agent: true
      periodic-prow-auto-sippy-config-generator: true
  ocp-hypershift:
    regexp:
      - "^periodic-ci-openshift-hypershift-.*-periodics-hcm-.*"
