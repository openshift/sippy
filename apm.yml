name: sippy
version: 1.0.0
description: CI analysis and release health monitoring for OpenShift
targets:
  - claude
  - cursor
  - gemini
  - opencode

dependencies:
  # External dependencies can be pulled from GitHub, e.g.:
  # apm:
  #   - openshift-eng/ai-helpers/plugins/bigquery
  apm: []
  mcp:
    - name: playwright
      registry: false
      transport: stdio
      command: npx
      args:
        - "@playwright/mcp@latest"
        - "--viewport-size"
        - "1440,900"
    - name: sippy-dev
      registry: false
      transport: stdio
      command: mcp/run.sh
      args: []
    - name: atlassian
      registry: false
      transport: http
      url: https://mcp.atlassian.com/v1/mcp
